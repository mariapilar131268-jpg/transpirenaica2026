<style>
:root{
  --bg:#f4f1ec;--sf:#ffffff;--s2:#ede8e0;--s3:#e4ddd3;
  --bd:#cfc8bc;--tx:#1a1714;--mu:#7a7060;
  --red:#b5341a;--ora:#c8830a;--grn:#2a7a3b;--blu:#1a5c8a;--pur:#6a3d8a;
  --r:10px;--sh:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* SELECTOR */
#sel{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-top:max(24px,calc(env(safe-area-inset-top) + 12px));
  background:linear-gradient(160deg,#1c2b1a 0%,#2d3b1f 40%,#1a1f14 100%)}
.ltit{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#8faa6a;margin-bottom:20px}
.mtit{font-size:clamp(32px,8vw,58px);font-weight:400;color:#ffffff;line-height:1.05;text-align:center}
.mtit span{color:#ffffff}
.msub{font-size:16px;color:#d4e8b0;letter-spacing:2px;margin-top:12px;margin-bottom:28px;text-align:center;font-weight:600}
.slbl{font-size:16px;letter-spacing:4px;text-transform:uppercase;color:#ffffff;margin-bottom:20px;font-weight:700;border-bottom:1px solid rgba(200,217,138,0.3);padding-bottom:14px;width:100%;max-width:560px;text-align:center}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:560px}
.pbtn{background:linear-gradient(135deg,#e8e0cc 0%,#d8d0bc 100%);border:2px solid #b8a880;border-radius:var(--r);
  padding:14px 16px;display:flex;flex-direction:row;gap:12px;align-items:center;transition:all .2s;color:#1a2a0a;min-height:64px}
.pbtn:hover,.pbtn:active{background:linear-gradient(135deg,#f0e8d4 0%,#e0d8c4 100%);border-color:#4a7a2a;transform:translateY(-1px)}
.pbtn .pico{font-size:26px;flex-shrink:0}.pbtn .pnm{font-size:16px;font-weight:700;text-align:left;line-height:1.2;color:#1a2a0a}
.pbtn .pmot{font-size:11px;color:#3a5a1a;text-align:left;line-height:1.3}
.rtabtn{margin-top:20px;width:100%;max-width:560px;padding:16px 20px;background:#3a5c1e;border:1px solid #4a7228;border-radius:var(--r);color:#e8f4c8;font-family:'DM Sans',system-ui,sans-serif;font-size:16px;cursor:pointer;letter-spacing:.5px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.rtabtn:active{background:#4a7228}
#rutaview{background:#f0ede6}
.rutahdr{background:#2e4a12;padding:14px 16px;padding-top:calc(env(safe-area-inset-top,0px) + 14px);display:flex;align-items:center;gap:10px;border-bottom:3px solid #4a7228;position:sticky;top:0;z-index:99}
.rutahdr .bbk{color:#e8f4c8;font-size:20px;padding:4px 8px;background:rgba(255,255,255,.1);border-radius:6px}
.rutahdr-tit{font-family:'DM Sans',system-ui,sans-serif;font-size:17px;font-weight:bold;color:#e8f4c8}
.rutahdr-sub{font-size:12px;color:#b8d888;margin-left:auto}
.rmapa-wrap{margin:0 0 16px 0;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.18);position:relative}
.rcard{background:#fff;border-radius:12px;border:1px solid #d4cfc6;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.rcard-hdr{padding:13px 15px;background:#2e4a12;display:flex;align-items:flex-start;gap:8px}
.rcard-hdr .rdia{font-size:10px;letter-spacing:2px;color:#b8d888;text-transform:uppercase;margin-bottom:3px}
.rcard-hdr .rtit{font-family:'DM Sans',system-ui,sans-serif;font-size:15px;font-weight:bold;color:#ffffff}
.rcard-hdr .rtip2{font-size:11px;color:#c8e8a0;margin-top:2px}
.rcard-hdr .rkm{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:12px;color:#e8f4c8;white-space:nowrap;margin-left:auto;margin-top:2px}
.rcard-body{padding:14px 15px}
.rstarr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.rstarr .star{background:#e8f0d8;border:1px solid #b8cc88;border-radius:20px;padding:4px 11px;font-size:11px;color:#2e4a12;font-weight:600}
.rstarr .star.red{background:#fde8e0;border-color:#e8a090;color:#8b2010}
.rstarr .star.ora{background:#fef3e0;border-color:#e8c070;color:#7a4a00}
.rtip{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #ede8e0}
.rtip:last-child{border-bottom:none;padding-bottom:0}
.rtip-ico{font-size:17px;min-width:26px;text-align:center;margin-top:1px}
.rtip-tx{font-size:13px;color:#2a2520;line-height:1.65}
.rtip-tx strong{color:#2e4a12;font-weight:700}
.rtip-tx em{color:#6a5a40;font-style:italic}
.rpoi{background:#f8f5ef;border-radius:10px;border:1px solid #d4cfc6;margin-top:12px;overflow:hidden}
.rpoi-hdr{background:#e8f0d8;padding:8px 12px;font-size:11px;font-weight:700;color:#2e4a12;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid #d4cfc6}
.rpoi-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid #ede8e0}
.rpoi-item:last-child{border-bottom:none}
.rpoi-ico{font-size:20px;min-width:28px;text-align:center}
.rpoi-info{flex:1}
.rpoi-nm{font-size:13px;font-weight:700;color:#1a1714;margin-bottom:2px}
.rpoi-det{font-size:11.5px;color:#5a5040;line-height:1.5;margin-bottom:4px}
.rpoi-det .tt{background:#fff3e0;color:#7a4a00;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;margin-right:4px}
.rpoi-det .tm{background:#e8f0d8;color:#2e4a12;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;margin-right:4px}
.rpoi-map{display:inline-block;margin-top:5px;padding:4px 10px;background:#2e4a12;color:#e8f4c8 !important;border-radius:6px;font-size:11px;text-decoration:none;font-family:'DM Sans',system-ui,sans-serif}
.rmeteo{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding:10px 12px;background:#e8f4ff;border-radius:8px;border:1px solid #b8d8f0}
.rmeteo-tit{width:100%;font-size:11px;font-weight:700;color:#3a6080;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.rmeteo-item{text-align:center;min-width:70px;background:#fff;border-radius:6px;padding:6px 8px;border:1px solid #c8e0f0}
.rmeteo-item .mlab{font-size:10px;color:#3a6080;letter-spacing:.5px;text-transform:uppercase}
.rmeteo-item .mval{font-size:14px;font-weight:700;color:#1a3a50;margin-top:2px}
.rgeneral{background:#fffbf0;border:1px solid #e8d890;border-radius:12px;padding:14px 15px;margin-bottom:16px}
.rgeneral-tit{font-family:'DM Sans',system-ui,sans-serif;font-size:14px;font-weight:bold;color:#6a4a00;margin-bottom:10px}
.rgeneral .rtip{border-bottom-color:#f0e8c0}
.rgeneral .rtip-tx strong{color:#6a4a00}
.a2tag{font-size:11px;background:#3a6a1a;color:#e8f4c8;padding:2px 6px;border-radius:10px;vertical-align:middle;margin-left:4px}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
.ahdr{position:sticky;top:0;z-index:100;background:var(--sf);border-bottom:2px solid var(--bd);
  padding:12px 16px;padding-top:calc(env(safe-area-inset-top,0px) + 12px);display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
.bbk{width:36px;height:36px;border-radius:50%;background:var(--s2);color:var(--tx);font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hinf{flex:1}.hnam{font-size:16px;font-weight:700}.hmot{font-size:11px;color:var(--mu);letter-spacing:.5px}
.hbdg{font-size:22px}
.ntabs{display:flex;border-bottom:2px solid var(--bd);background:var(--sf);position:sticky;top:64px;z-index:99}
.ntab{flex:1;padding:12px 6px;font-size:12px;font-weight:700;color:var(--mu);letter-spacing:.5px;
  border-bottom:3px solid transparent;transition:.15s;text-align:center}
.ntab.active{color:var(--red);border-bottom-color:var(--red)}
.tcont{display:none;padding:14px 14px 40px;max-width:700px;margin:0 auto;width:100%}
.tcont.show{display:block}

/* TARJETA D├ŹA */
.dcard{background:var(--sf);border-radius:14px;box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;border:1px solid var(--bd)}
.dcard.today{border:2px solid var(--ora);box-shadow:0 4px 20px rgba(200,131,10,.2)}
.dbanner{padding:16px 16px 12px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;user-select:none}
.dbanner:hover{background:var(--s2)}
.dnum-w{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:44px}
.dnum{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu)}
.dnum-n{font-size:30px;font-weight:700;color:var(--red);line-height:1}
.dnum-e{font-size:20px;margin-top:2px}
.dinf{flex:1}
.dfecha{font-size:11px;color:var(--ora);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.dtit{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:6px}
.dmeta{display:flex;flex-wrap:wrap;gap:5px}
.dchip{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.ck-km{background:#fcecea;color:var(--red)}
.ck-dt{background:#e8f1f8;color:var(--blu)}
.ck-ht{background:#fdf6e3;color:var(--ora)}
.ck-hoy{background:var(--ora);color:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.darrow{font-size:14px;color:var(--mu);align-self:center;flex-shrink:0;transition:transform .25s}
.darrow.open{transform:rotate(90deg)}

/* Body d├Ła */
.dbody{display:none;border-top:1px solid var(--s2)}
.dbody.open{display:block}
.dsec{padding:13px 16px;border-bottom:1px solid var(--s2)}
.dsec:last-child{border-bottom:none}
.dstit{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.dstit::after{content:'';flex:1;height:1px;background:var(--bd)}

/* Ruta */
.rl{display:flex;flex-direction:column}
.ri{display:flex;gap:10px;align-items:flex-start}
.rline{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px}
.rdot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--red);background:var(--bg);flex-shrink:0;margin-top:3px}
.rdot.start{background:var(--grn);border-color:var(--grn)}
.rdot.end{background:var(--red);border-color:var(--red)}
.rdot.gas{background:var(--ora);border-color:var(--ora)}
.rdot.special{background:var(--blu);border-color:var(--blu)}
.rdot.food{background:var(--pur);border-color:var(--pur)}
.rvert{width:2px;background:var(--bd);flex:1;min-height:14px;margin:2px 0}
.rinfo{padding-bottom:12px;flex:1}
.rp{font-size:13px;font-weight:600}.rn{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.4}

/* Meteo */
.mbox{background:linear-gradient(135deg,#e8f4fd,#d6eaf8);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:14px}
.mico{font-size:32px;flex-shrink:0}
.mdata{flex:1}
.mtemp{font-size:18px;font-weight:700;color:var(--blu)}
.mdesc{font-size:12px;color:#1a5c8a;margin-top:2px}
.mdet{font-size:11px;color:var(--mu);margin-top:4px}
.mload{font-size:12px;color:var(--mu);font-style:italic;text-align:center;padding:14px;background:var(--s2);border-radius:10px}

/* Hotel */
.hbox{background:var(--s2);border-radius:10px;padding:12px 14px;border-left:4px solid var(--grn)}
.hbox.pend{border-left-color:var(--ora)}
.hnm{font-size:13px;font-weight:700;margin-bottom:5px}
.hdet{font-size:12px;color:var(--mu);line-height:1.7}
.hdet strong{color:var(--tx)}
.hcode{display:inline-block;background:var(--grn);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;margin-top:5px;letter-spacing:.5px}

/* Gas */
.gbox{border-radius:10px;padding:11px 14px;margin-bottom:8px}
.gbox.key{background:#fff8e6;border-left:4px solid var(--ora)}
.gbox.ok{background:var(--s2);border-left:4px solid var(--bd)}
.gnm{font-size:13px;font-weight:700}.gnm.key{color:var(--ora)}
.ginf{font-size:11px;color:var(--mu);line-height:1.5;margin-top:3px}

/* Restaurante */
.rbox{background:var(--s2);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.rbox.top{border-left:4px solid var(--ora)}
.rmom{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ora);margin-bottom:3px}
.rnm{font-size:13px;font-weight:700;margin-bottom:4px}
.rinf{font-size:12px;color:var(--mu);line-height:1.5}

/* Links */
.lrow{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.lk{font-size:14px;font-weight:700;text-decoration:none;padding:12px 20px;border-radius:10px;
  min-height:48px;display:inline-flex;align-items:center;gap:6px;letter-spacing:.3px}
.lk.map{background:#d0e8f5;color:#1a5c8a;border:1.5px solid #9ac4de}
.lk.tel{background:#d4f0db;color:#1e6b2e;border:1.5px solid #90c89c}
.lk.web{background:#fdefc8;color:#8a5c00;border:1.5px solid #d9c070}

/* Alertas */
.al{border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border-left:3px solid;font-size:13px;line-height:1.5}
.al h4{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.al-s{background:#edf7ef;border-color:var(--grn);color:#1a3d22}
.al-w{background:#fdf6e3;border-color:var(--ora);color:#3d2a05}
.al-i{background:#e8f1f8;border-color:var(--blu);color:#0d2d45}
.al-d{background:#fcecea;border-color:var(--red);color:#3d0f08}

/* Nota especial */
.nspec{background:linear-gradient(135deg,#f0e8ff,#e8f0ff);border:1px solid #c5a8ff;border-radius:10px;padding:12px 14px}
.nspec h4{font-size:11px;font-weight:700;color:var(--pur);letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}
.nspec p{font-size:12px;color:#2a1a4a;line-height:1.6}

/* Foro tip */
.ftip{background:#f5f0ff;border:1px solid #d4c0ff;border-radius:10px;padding:12px 14px}
.ftip-l{font-size:10px;font-weight:700;color:var(--pur);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ftip p{font-size:12px;color:#2a1a4a;line-height:1.6}

/* CHECK */
.ck-pw{background:var(--sf);border-radius:10px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid var(--bd)}
.ck-pl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;color:var(--mu)}
.ck-pb{background:var(--s2);border-radius:20px;height:8px;overflow:hidden}
.ck-pf{height:100%;background:linear-gradient(90deg,var(--grn),var(--ora));border-radius:20px;transition:.4s;width:0%}
.ck-sec{background:var(--sf);border-radius:10px;box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;border:1px solid var(--bd)}
.ck-sh{padding:12px 16px;background:var(--s2);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu)}
.ck-it{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--s2);font-size:13px}
.ck-it:last-child{border-bottom:none}
.ck-it input{width:18px;height:18px;accent-color:var(--grn);cursor:pointer;flex-shrink:0}
.ck-it label{cursor:pointer;line-height:1.4}
.ck-it input:checked + label{text-decoration:line-through;color:var(--mu)}
.ck-tip{font-size:11px;color:var(--ora);font-style:italic;padding:8px 16px;background:#fdf6e3;border-top:1px solid #f0e0b0}

/* PAGOS */
.pp{background:var(--sf);border-radius:14px;box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;border:1px solid var(--bd)}
.pph{padding:14px 18px;display:flex;align-items:center;gap:12px}
.pph-r{background:var(--red)}.pph-g{background:var(--grn)}.pph-b{background:var(--blu)}.pph-o{background:var(--ora)}
.ppt{font-size:14px;font-weight:700;letter-spacing:.5px;color:#fff}
.pps{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
.ppico{font-size:26px}
.pr{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--s2);font-size:13px}
.pr:last-child{border-bottom:none}
.pr input{width:18px;height:18px;accent-color:var(--grn);cursor:pointer;flex-shrink:0}
.pr .prn{flex:1}.pr .pra{font-weight:700;white-space:nowrap}
.ppf{padding:12px 16px;background:var(--s2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ppfl{font-size:11px;color:var(--mu)}.ppfv{font-size:17px;font-weight:700}
.calb{font-size:11px;padding:7px 12px;border-radius:7px;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;font-weight:700;color:#fff}

/* Tabla cobros */
.ctab{width:100%;border-collapse:collapse;font-size:12px}
.ctab th{padding:8px 10px;background:var(--s2);text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mu)}
.ctab td{padding:9px 10px;border-bottom:1px solid var(--s2)}
.ctab tr:last-child td{border-bottom:none}
.bpag{background:#edf7ef;color:var(--grn);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.bpen{background:#fcecea;color:var(--red);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--s2);font-size:12px;line-height:1.5}
.rrow:last-child{border-bottom:none}

/* ŌöĆŌöĆ MODO CONDUCCI├ōN ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
#modoConduccion{display:none;position:fixed;inset:0;z-index:9000;
  background:#0d1f0d;flex-direction:column;overflow:hidden;
  padding-top:calc(env(safe-area-inset-top,0px) + 0px)}
#modoConduccion.activo{display:flex}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:2px solid #1e3a1e;
  padding-top:calc(env(safe-area-inset-top,0px) + 14px);flex-shrink:0}
#mc-dias-fijos{flex-shrink:0;padding:10px 16px 6px;background:#0d1f0d;border-bottom:1px solid #1e3a1e}
.mc-titulo{color:#d4f0a8;font-size:11px;letter-spacing:2.5px;font-weight:700;text-transform:uppercase}
.mc-cerrar{background:#c8e8a8;color:#0a1a0a;border:2px solid #8ab870;

async function loadMeteo(lat,lon,nm,eid){
 const el=document.getElementById(eid);
 if(!el)return;
 el.innerHTML='<div class="mload">­¤īż’ĖÅ Cargando tiempo en '+nm+'...</div>';
 try{
  const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,wind_speed_10m_max&timezone=Europe%2FMadrid&forecast_days=16');
  const js=await r.json();
  const fv=['2026-06-18','2026-06-19','2026-06-20','2026-06-21','2026-06-22','2026-06-23'];
  const di=parseInt(eid.split('-')[1]);
  let idx=js.daily.time.indexOf(fv[di]);
  const nota=idx===-1?'(previsi├│n no disponible a├║n para junio 2026)':null;
  if(idx===-1)idx=0;
  const wc=js.daily.weathercode[idx];
  const mx=Math.round(js.daily.temperature_2m_max[idx]);
  const mn=Math.round(js.daily.temperature_2m_min[idx]);
  const pr=js.daily.precipitation_sum[idx];
  const wi=Math.round(js.daily.wind_speed_10m_max[idx]);
  el.innerHTML='<div class="mbox"><div class="mico">'+(WI[wc]||'­¤īż’ĖÅ')+'</div><div class="mdata"><div class="mtemp">'+mx+'┬░ <span style="font-size:13px;font-weight:400">/ '+mn+'┬░</span></div><div class="mdesc">'+(WD[wc]||'Variable')+' ┬Ę <strong>'+nm+'</strong></div><div class="mdet">­¤ī¦ '+pr+' mm ┬Ę ­¤Æ© '+wi+' km/h'+(nota?' ŌĆö <em>'+nota+'</em>':'')+'</div></div></div>';
 }catch(e){
  el.innerHTML='<div class="mload" style="font-size:11px">ŌÜĀ’ĖÅ Meteo no disponible. Consulta <a href="https://www.tiempo.es" target="_blank" style="color:var(--blu)">tiempo.es</a></div>';
 }
}

function diaHoy(){
 // Usamos a├▒o/mes/d├Ła en hora LOCAL para evitar el bug UTC de new Date('YYYY-MM-DD')
 const h=new Date();
 const y=h.getFullYear(), m=h.getMonth()+1, dia=h.getDate();
 const dias=[
  {y:2026,m:6,d:18}, // D├Ła 0
  {y:2026,m:6,d:19}, // D├Ła 1
  {y:2026,m:6,d:20}, // D├Ła 2
  {y:2026,m:6,d:21}, // D├Ła 3
  {y:2026,m:6,d:22}, // D├Ła 4
  {y:2026,m:6,d:23}, // D├Ła 5 (vuelta)
 ];
 for(let i=0;i<dias.length;i++){
  if(y===dias[i].y && m===dias[i].m && dia===dias[i].d) return i;
 }
 return -1;
}

function renderCK(){
 let html='<div class="ck-pw"><div class="ck-pl"><span>Preparaci├│n pre-viaje</span><span id="ckp">0%</span></div><div class="ck-pb"><div class="ck-pf" id="ckf"></div></div></div>';
 let sec='',its=[],tip='';
 CK.forEach((x,i)=>{
  if(x.cat){
   if(its.length)html+=`<div class="ck-sec"><div class="ck-sh">${sec}</div>${its.join('')}${tip?`<div class="ck-tip">­¤Æ¼ ${tip}</div>`:''}</div>`;
   sec=x.cat;its=[];tip=x.tip||'';
  }else if(x.it){
   its.push(`<div class="ck-it"><input type="checkbox" id="ci${i}" onchange="updCK()"><label for="ci${i}">${x.it}</label></div>`);
  }
 });
 if(its.length)html+=`<div class="ck-sec"><div class="ck-sh">${sec}</div>${its.join('')}${tip?`<div class="ck-tip">­¤Æ¼ ${tip}</div>`:''}</div>`;
 document.getElementById('tab-ck').innerHTML=html;
 // Restaurar checks guardados
 try{
  const key='transpi2026_'+curP.id;
  const raw=localStorage.getItem(key);
  if(raw){
   const data=JSON.parse(raw);
   if(data.ck){
    const inputs=document.querySelectorAll('#tab-ck input[type=checkbox]');
    data.ck.forEach((v,i)=>{ if(inputs[i]) inputs[i].checked=v; });
   }
  }
 }catch(e){}
 updCK();
}

function updCK(){
 const all=document.querySelectorAll('#tab-ck input[type=checkbox]');
 const done=[...all].filter(x=>x.checked).length;
 const pct=all.length?Math.round(done/all.length*100):0;
 const f=document.getElementById('ckf'),l=document.getElementById('ckp');
 if(f)f.style.width=pct+'%';
 if(l)l.textContent=pct+'% ┬Ę '+done+'/'+all.length;
 // Guardar estado del checklist
 if(curP){
  const ckState=[...all].map(x=>x.checked);
  try{
   const key='transpi2026_'+curP.id;
   const raw=localStorage.getItem(key);
   const data=raw?JSON.parse(raw):{pagos:[],cobros:[]};
   data.ck=ckState;
   localStorage.setItem(key,JSON.stringify(data));
  }catch(e){}
 }
}

 var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\n'

// ŌöüŌöüŌöü PERSISTENCIA localStorage ŌöüŌöüŌöü
function saveState(){
 if(!curP) return;
 const key='transpi2026_'+curP.id;
 // Guardar por nombre de hotel (resistente a cambios de orden entre versiones)
 const data={
  pagos:{},
  cobros:{}
 };
 if(curP.pagos) curP.pagos.forEach(p=>{ data.pagos[p.h]=p.ok; });
 if(curP.cobros) curP.cobros.forEach(c=>{ data.cobros[c.p]=c.ok; });
 try{ localStorage.setItem(key, JSON.stringify(data)); }catch(e){}
}

function loadState(piloto){
 const key='transpi2026_'+piloto.id;
 try{
  const raw=localStorage.getItem(key);
  if(!raw) return;
  const data=JSON.parse(raw);
  // Formato nuevo: objetos indexados por nombre
  if(data.pagos && typeof data.pagos==='object' && !Array.isArray(data.pagos)){
   if(piloto.pagos) piloto.pagos.forEach(p=>{ if(data.pagos[p.h]!==undefined) p.ok=data.pagos[p.h]; });
  } else if(Array.isArray(data.pagos)){
   // Compatibilidad con formato antiguo (array posicional)
   if(piloto.pagos) data.pagos.forEach((ok,i)=>{ if(piloto.pagos[i]) piloto.pagos[i].ok=ok; });
  }
  if(data.cobros && typeof data.cobros==='object' && !Array.isArray(data.cobros)){
   if(piloto.cobros) piloto.cobros.forEach(c=>{ if(data.cobros[c.p]!==undefined) c.ok=data.cobros[c.p]; });
  } else if(Array.isArray(data.cobros)){
   if(piloto.cobros) data.cobros.forEach((ok,i)=>{ if(piloto.cobros[i]) piloto.cobros[i].ok=ok; });
  }
 }catch(e){}
}

// Extrae el valor ?q= de una URL Google Maps para usarlo en /maps/dir/
function qDeMapa(url){
  if(!url) return null;
  const m = url.match(/[?&]q=([^&]+)/);
  return m ? m[1] : null; // ya viene URL-encoded, no decodificar
}

// Construye URL Google Maps multi-parada con orden geogr├Īfico correcto por d├Ła.
// Las rutas de moto pasan por puertos que Google Maps evita ŌåÆ forzamos puntos clave.
function buildGmapsUrl(d, almIdx){

  // Si el restaurante elegido tiene su propia URL de ruta completa, usarla directamente
  const listaComida = (d.alm && d.alm.length > 0) ? d.alm
                    : (d.cen && d.cen.length > 0)  ? d.cen : [];
  const restaurante = listaComida.length > 0 ? (listaComida[almIdx] || listaComida[0]) : null;
  if(restaurante && restaurante.mapsRuta) return restaurante.mapsRuta;

  const qComida = restaurante ? qDeMapa(restaurante.map) : null;

  // Rutas definidas manualmente por d├Ła para respetar el orden real de puertos
  // Formato: array de par├Īmetros ?q= ya codificados, en orden geogr├Īfico correcto
  const RUTAS = {
    // ŌöĆŌöĆ D├ŹA 0 ŌöĆŌöĆ Tarde: Montcada ŌåÆ Figueres ŌåÆ Roses ŌåÆ Cadaqu├®s ŌåÆ Llan├¦├Ā
    // La Pausa ES el punto de encuentro de todos ŌåÆ correcto como origen
    0: [
      'Area+de+servicio+La+Pausa+Montcada+i+Reixac',
      'Figueres',
      'Cap+de+Creus',
      'Cadaques',
      'El+Port+de+la+Selva',
      'Monestir+de+Sant+Pere+de+Rodes',
      'Hotel+Beri+Llanca'
    ],
    // ŌöĆŌöĆ D├ŹA 1 ŌöĆŌöĆ Llan├¦├Ā ŌåÆ Cap de Creus (inicio oficial) ŌåÆ Besal├║ ŌåÆ Toses ŌåÆ La Seu ŌåÆ Sort
    1: [
      'Hotel+Beri+Llanca',
      'Cap+de+Creus+Girona',
      'Vilajuiga',
      'Besalu',
      'Olot',
      'Camprodon',
      'Ribes+de+Freser',
      '42.3167,2.0833',
      'Puigcerda',
      'Restaurant+Ruta+260+Prullans+de+Cerdanya',
      'Repsol+Puigcerda+N-152',
      'Repsol+ES+La+Seu+d%27Urgell,+Avinguda+Valira,+25,+La+Seu+d%27Urgell',
      'Puerto+del+Cant%C3%B3+Lleida',
      'Hotel+Les+Brases+Sort'
    ],
    // ŌöĆŌöĆ D├ŹA 2 ŌöĆŌöĆ Sort ŌåÆ bon├Ćrea(gas) ŌåÆ Bonaigua ŌåÆ Arties(comida) ŌåÆ Vielha ŌåÆ A├Łnsa
    // ORDEN CORRECTO: Arties est├Ī ANTES de Vielha subiendo desde Bonaigua
    2: [
      'Hotel+Les+Brases+Sort+Lleida',            // origen: salen del hotel
      'bonArea+Sort',                     // gas cr├Łtica (llenar AL 100% antes Bonaigua)
      'Puerto+de+la+Bonaigua+Lleida',            // puerto 2.072m
      qComida,                                   // comida Arties (ANTES de Vielha)
      'Vielha+Lleida',                           // Vielha: girar sur por N-230
      'Hostal+Pirineos+Ainsa+Sobrarbe+7'         // destino
    ],
    // ŌöĆŌöĆ D├ŹA 3 REINA ŌöĆŌöĆ A├Łnsa ŌåÆ Portalet ŌåÆ Laruns(comida) ŌåÆ Oloron(gas) ŌåÆ Pierre Saint-Martin ŌåÆ Isaba
    // ORDEN GEOGR├üFICO: Biescas ŌåÆ Formigal ŌåÆ Portalet ŌåÆ Laruns ŌåÆ Oloron ŌåÆ Arette ŌåÆ Pierre Saint-Martin ŌåÆ Isaba
    // ŌÜĀ’ĖÅ Gavarnie es callej├│n sin salida (~80km desv├Ło) ŌĆö NO es waypoint, solo POI opcional en texto
    3: [
      'Hostal+Pirineos+Ainsa',
      'Broto',
      'Biescas',
      'Repsol+ES+15103+Gasolinera+de+Biescas,+CR+C-136,+72,+Biescas',
      'Formigal',
      'Col+du+Portalet',
      'Laruns',
      'Hotel+Restaurant+d%27Ossau,+Place+de+la+Mairie,+Laruns,+Francia',
      'Oloron-Sainte-Marie',
      'TotalEnergies+d%27Oloron,+28+Rue+Charles+et+Henri+Moureu,+64400+Oloron-Sainte-Marie,+Francia',
      'Arette',
      'La+Pierre+Saint-Martin',
      'Casa+Lola+Isaba'
    ],
    // ŌöĆŌöĆ D├ŹA 4 ŌöĆŌöĆ Isaba ŌåÆ Irati ŌåÆ Roncesvalles ŌåÆ Urzainqui(gas) ŌåÆ Elizondo(comida) ŌåÆ Hondarribia
    // Urzainqui est├Ī entre Roncesvalles y Elizondo en la ruta real (N-135 sur)
    4: [
      'Casa+Lola+Isaba+Navarra+Mendigatxa+17',   // origen: salen del hotel
      'Orbaitzeta+Navarra',                      // entrada Bosque de Irati
      'Roncesvalles+Navarra',                    // colegiata s.XII (20min)
      'Petronor+E.S.+Valle+de+Roncal,+CR+NA-137,+28.7,+Urzainqui,+Navarra', // gas ├ÜNICA en 100km
      qComida,                                   // comida Elizondo (Valle Bazt├Īn)
      'Hotel+Jauregui+Hondarribia'               // destino: LLEGADA ­¤Åü
    ],
    // ŌöĆŌöĆ D├ŹA 5 ŌöĆŌöĆ Hondarribia ŌåÆ autop├Ła ŌåÆ Santa Coloma (620km vuelta)
    5: [
      'Hotel+Jauregui+Hondarribia',
      'Pamplona',
      'Zaragoza',
      'Repsol+CRED+Zaragoza,+Avenida+de+la+Hispanidad,+15,+Zaragoza',
      'Lleida',
      'Repsol+RP+Centre+Lleida,+Carrer+Academia,+30,+Lleida',
      'Barcelona'
    ]
  };

  // Obtener paradas del d├Ła y filtrar nulos
  // Quitamos el primer waypoint (origen fijo) ŌåÆ Maps usa la ubicaci├│n actual del piloto
  // As├Ł siempre aparece el bot├│n "Iniciar" en lugar de "Vista previa"
  const todasParadas = (RUTAS[d.n] || []).filter(Boolean);
  const paradas = todasParadas.slice(1); // sin origen fijo
  if(paradas.length < 2) return null;
  return 'https://www.google.com/maps/dir//' + paradas.join('/');
}

  </div>`;

  // ŌöĆŌöĆ Km etapa + puntos de ruta ŌöĆŌöĆ
  const puntosRuta = d.ruta ? d.ruta.map(r => {
    if(!r || !r.p) return null;
    return r.p
      .replace(/^[ŌŁÉ­¤ÅüŌøĮ­¤ŹĮ’ĖÅ\s]+/u, '')
      .replace(/\s*ŌĆö\s*(COMIDA|CR├ŹTICO|CENA|SALIDA)\S*/gi, '')
      .split('┬Ę')[0].trim();
  }).filter(Boolean) : [];
  const puntosHtml = puntosRuta.length > 0
    ? `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px 6px;align-items:center">${
        puntosRuta.map((p,i) =>
          `<span style="color:#a8d888;font-size:13px;font-weight:600">${p}</span>${i < puntosRuta.length-1 ? '<span style="color:#5a8a4a;font-size:12px">ŌĆ║</span>' : ''}`
        ).join('')
      }</div>` : '';
  html += `<div class="mc-bloque">
    <div class="mc-label">­¤ōÅ Etapa</div>
    <div class="mc-valor">${d.km} ŌåÆ ${d.dest}</div>
    ${puntosHtml}
  </div>`;

  // ŌöĆŌöĆ BOT├ōN GOOGLE MAPS (siempre visible arriba) ŌöĆŌöĆ
  const mapsUrlInicial = buildGmapsUrl(d, 0);
  html += `<div id="mc-maps-fixed">
    ${mapsUrlInicial ? `<a href="${mapsUrlInicial}" target="_blank"
      style="display:flex;align-items:center;justify-content:center;gap:12px;
      background:#1a52a8;border:3px solid #4a82d8;border-radius:16px;
      color:#ffffff;width:100%;box-sizing:border-box;
      font-size:20px;font-weight:700;padding:20px 16px;text-align:center;
      min-height:68px;text-decoration:none;letter-spacing:.3px">
      <span style="font-size:28px">­¤Ś║’ĖÅ</span> Abrir ruta en Google Maps
    </a>` : ''}
  </div>`;

  // ŌöĆŌöĆ Selector comida / cena ŌöĆŌöĆ
  if(listaComida.length > 0){
    html += `<div class="mc-bloque" style="border-color:#3a5a3a">
      <div class="mc-label">${labelComida} <span style="font-size:11px;color:#5a9a5a">(cambia la parada en el mapa)</span></div>`;
    listaComida.forEach((item, i) => {
      const medal = i===0?'­¤Åå':i===1?'­¤źł':'­¤źē';
      html += `<button onclick="mcSelComida(${i})" id="mc-alm-${mcDiaActual}-${i}"
        style="width:100%;text-align:left;background:${i===0?'#1a3a1a':'#0f2a0f'};
        border:2px solid ${i===0?'#7ec87e':'#2a4a2a'};
        border-radius:10px;padding:10px 14px;color:#c8e8a8;font-size:13px;
        cursor:pointer;margin-bottom:6px">
        ${medal} <strong>${item.nm}</strong>
        <span style="color:#5a9a5a;font-size:11px;display:block;margin-top:2px">${item.loc||''} ${item.pr?'┬Ę '+item.pr:''}</span>
      </button>`;
    });
    html += `</div>`;
  }

  // ŌöĆŌöĆ Gasolinera cr├Łtica ŌöĆŌöĆ
  if(gasCrit){
    html += `<div class="mc-bloque ${gasCrit.key ? 'rojo' : ''}">
      <div class="mc-label">ŌøĮ ${gasCrit.key ? 'ŌÜĀ’ĖÅ GASOLINERA CR├ŹTICA' : 'Gasolinera del d├Ła'}</div>
      <div class="mc-valor ${gasCrit.key ? 'rojo' : ''}" style="font-size:18px">${gasCrit.nm}</div>
      <div class="mc-sub ${gasCrit.key ? 'rojo' : ''}">${gasCrit.dir}<br>${gasCrit.not}</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <a href="${gasCrit.map}" target="_blank" class="mc-btn-mc">­¤Ś║’ĖÅ Mapa</a>
        ${gasCrit.tel ? `<a href="tel:${gasCrit.tel}" class="mc-btn-mc">­¤ō× ${gasCrit.tel}</a>` : ''}
      </div>
    </div>`;
  }

  // ŌöĆŌöĆ Hotel esta noche ŌöĆŌöĆ
  if(h){
    html += `<div class="mc-bloque ${hotelPend ? 'naranja' : ''}">
      <div class="mc-label">­¤øÅ’ĖÅ Esta noche</div>
      <div class="mc-valor ${hotelPend ? 'naranja' : ''}" style="font-size:18px">${hotelNm}</div>
      ${h.dir ? `<div class="mc-sub ${hotelPend ? 'naranja' : ''}">${h.dir}</div>` : ''}
      ${hotelPend ? `<div class="mc-sub naranja" style="margin-top:4px">ŌÅ│ Pendiente confirmar</div>` : ''}
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        ${h.map ? `<a href="${h.map}" target="_blank" class="mc-btn-mc">­¤Ś║’ĖÅ C├│mo llegar</a>` : ''}
        ${hotelTel ? `<a href="tel:${hotelTel}" class="mc-btn-mc">­¤ō× Llamar</a>` : ''}
      </div>
    </div>`;
  }

  // ŌöĆŌöĆ Alerta personal ŌöĆŌöĆ
  if(alertaPiloto){
    html += `<div class="mc-bloque naranja">
      <div class="mc-label">ŌÜĀ’ĖÅ Tu alerta</div>
      <div class="mc-sub naranja" style="font-size:15px;color:#f0c060">${alertaPiloto.b}</div>
    </div>`;
  }

  body.innerHTML = html;
}

// Cuando el piloto elige restaurante/cena, actualiza el bot├│n Maps
function mcSelComida(almIdx){
  const d = D[mcDiaActual];
  if(!d) return;

  // Lista unificada (igual que en renderMC)
  const listaComida = (d.alm && d.alm.length > 0) ? d.alm
                    : (d.cen && d.cen.length > 0)  ? d.cen : [];

  // Resaltar bot├│n seleccionado, desmarcar resto
  listaComida.forEach((_, i) => {
    const btn = document.getElementById('mc-alm-' + mcDiaActual + '-' + i);
    if(btn){
      btn.style.borderColor = i === almIdx ? '#7ec87e' : '#2a4a2a';
      btn.style.background  = i === almIdx ? '#1a3a1a' : '#0f2a0f';
    }
  });

  // Actualizar bot├│n Google Maps con la parada de comida elegida
  const mapsUrl = buildGmapsUrl(d, almIdx);
  const btnDiv = document.getElementById('mc-maps-fixed');
  if(btnDiv){
    btnDiv.innerHTML = mapsUrl
      ? `<a href="${mapsUrl}" target="_blank"
          style="display:flex;align-items:center;justify-content:center;gap:12px;
          background:#1a52a8;border:3px solid #4a82d8;border-radius:16px;
          color:#ffffff;width:100%;box-sizing:border-box;
          font-size:20px;font-weight:700;padding:20px 16px;text-align:center;
          min-height:68px;text-decoration:none;letter-spacing:.3px">
          <span style="font-size:28px">­¤Ś║’ĖÅ</span> Abrir ruta en Google Maps
        </a>`
      : '';
  }
}

// ŌöüŌöüŌöü COMPROBACI├ōN DE VERSI├ōN ŌĆö iOS + Android PWA ŌöüŌöüŌöü
const APP_VERSION = '21';
(function checkVersion(){
  fetch('./version.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => { if(data.v && data.v !== APP_VERSION) window.location.reload(); })
    .catch(() => {});
})();

// ŌöüŌöüŌöü PWA: Registro del Service Worker ŌöüŌöüŌöü
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js?v=21').then(reg => {
      // Detectar nueva versi├│n disponible
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if(newSW.state === 'installed' && navigator.serviceWorker.controller){
            // Hay versi├│n nueva lista ŌåÆ mostrar banner
            mostrarBannerActualizacion(newSW);
          }
        });
      });
    }).catch(e => {});

    // Si hay SW esperando al abrir (ven├Ła de antes)
    navigator.serviceWorker.ready.then(reg => {
      if(reg.waiting) mostrarBannerActualizacion(reg.waiting);
    });
  });
}

function mostrarBannerActualizacion(sw){
  if(document.getElementById('update-banner')) return; // ya visible
  const b = document.createElement('div');
  b.id = 'update-banner';
  b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a52a8;color:#fff;padding:14px 16px 20px;z-index:99999;font-family:DM Sans,system-ui,sans-serif;display:flex;align-items:center;gap:12px;box-shadow:0 -2px 12px rgba(0,0,0,.3);';
  b.innerHTML = `
    <div style="flex:1;font-size:14px;line-height:1.4">
      <strong>­¤åĢ Nueva versi├│n disponible</strong><br>
      <span style="font-size:12px;opacity:.85">Pulsa para actualizar la app</span>
    </div>
    <button onclick="sw_update()" style="background:#fff;color:#1a52a8;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap">Actualizar</button>
    <button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:8px 10px;font-size:16px;cursor:pointer">Ō£Ģ</button>`;
  document.body.appendChild(b);
  // Guardar referencia al SW para poder activarlo
  window._swWaiting = sw;
}

function sw_update(){
  if(window._swWaiting){
    window._swWaiting.postMessage({type:'SKIP_WAITING'});
  }
  window.location.reload();
}

// Recargar cuando el nuevo SW tome el control
navigator.serviceWorker && navigator.serviceWorker.addEventListener('controllerchange', () => {
  if(window._reloading) return;
  window._reloading = true;
  window.location.reload();
});

// ŌöüŌöüŌöü iOS: mostrar instrucci├│n de instalaci├│n ŌöüŌöüŌöü
function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function isInStandalone(){ return window.navigator.standalone === true; }

window.addEventListener('load', () => {
  if(isIOS() && !isInStandalone()){
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#2e4a12;color:#e8f4c8;padding:12px 16px 20px;font-size:13px;text-align:center;z-index:9999;font-family:DM Sans,system-ui,sans-serif;line-height:1.6;border-top:2px solid #4a7228;';
    banner.innerHTML = `<div style="font-size:11px;letter-spacing:1px;color:#b8d888;margin-bottom:4px">INSTALAR APP</div>
      Pulsa <strong style="color:#fff">Compartir</strong> <span style="font-size:16px">Ō¼å’ĖÅ</span> y luego<br>
      <strong style="color:#fff">"A├▒adir a pantalla de inicio"</strong>
      <button onclick="this.parentElement.remove()" style="display:block;margin:8px auto 0;padding:4px 16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;color:#e8f4c8;font-size:12px;cursor:pointer">Cerrar</button>`;
    // Solo mostrar si no lo han descartado antes
    if(!sessionStorage.getItem('iosBannerClosed')){
      setTimeout(() => document.body.appendChild(banner), 2000);
      banner.querySelector('button').addEventListener('click', () => sessionStorage.setItem('iosBannerClosed','1'));
    }
  }
});
</script>
