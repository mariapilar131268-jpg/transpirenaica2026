<style>
:root{
  --bg:#f4f1ec;--surface:#ffffff;--surface2:#ede8e0;--surface3:#e4ddd3;
  --border:#cfc8bc;--text:#1a1714;--muted:#7a7060;
  --accent:#b5341a;--accent2:#c8830a;--green:#2a7a3b;--blue:#1a5c8a;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow2:0 4px 24px rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;font-size:15px;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
#sel{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#1c2b1a 0%,#2d3b1f 40%,#1a1f14 100%)}
.ltit{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#8faa6a;margin-bottom:20px}
.mtit{font-size:clamp(34px,8vw,60px);font-weight:400;color:#f0ead8;line-height:1.05;text-align:center}
.mtit span{color:#c8d98a}
.msub{font-size:13px;color:#8faa6a;letter-spacing:2px;margin-top:14px;margin-bottom:40px}
.slbl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#8faa6a;margin-bottom:16px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;width:100%;max-width:560px}
.pbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);
  padding:14px 10px;display:flex;flex-direction:column;gap:5px;align-items:center;transition:all .2s;color:#f0ead8}
.pbtn:hover,.pbtn:active{background:rgba(200,217,138,0.15);border-color:#c8d98a;transform:translateY(-2px)}
.pbtn .pico{font-size:24px}
.pbtn .pnm{font-size:13px;font-weight:700}
.pbtn .pmot{font-size:10px;color:#8faa6a;text-align:center;line-height:1.3}
#app{display:none;min-height:100vh;flex-direction:column}
.ahdr{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:2px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.bbk{width:36px;height:36px;border-radius:50%;background:var(--surface2);color:var(--text);font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hinf{flex:1}.hnam{font-size:16px;font-weight:700}.hmot{font-size:11px;color:var(--muted);letter-spacing:.5px}
.hbdg{font-size:20px}
.ntabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;-webkit-overflow-scrolling:touch}
.ntab{flex:1;min-width:70px;padding:11px 6px;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.3px;
  border-bottom:2.5px solid transparent;transition:.15s;white-space:nowrap}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tcont{display:none;padding:16px;max-width:680px;margin:0 auto;width:100%}
.tcont.show{display:block}
.stit{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.alert{border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;border-left:3px solid;font-size:13px;line-height:1.5}
.alert h4{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.al-success{background:#edf7ef;border-color:var(--green);color:#1a3d22}
.al-warning{background:#fdf6e3;border-color:var(--accent2);color:#3d2a05}
.al-info{background:#e8f1f8;border-color:var(--blue);color:#0d2d45}
.al-danger{background:#fcecea;border-color:var(--accent);color:#3d0f08}
.ecard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:1px solid var(--border)}
.ehdr{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.ehdr:hover{background:var(--surface2)}
.eico{font-size:24px;flex-shrink:0}.einf{flex:1}
.etit{font-size:14px;font-weight:700}.esub{font-size:12px;color:var(--muted);margin-top:2px}
.ekm{font-size:11px;font-weight:700;color:var(--accent);background:#fcecea;padding:3px 8px;border-radius:20px;white-space:nowrap}
.ebody{display:none;padding:0 16px 14px;border-top:1px solid var(--surface2)}
.ebody.open{display:block}
.edesc{font-size:13px;color:var(--muted);padding:10px 0;line-height:1.6;border-bottom:1px solid var(--surface2);margin-bottom:10px}
.ruta{display:flex;flex-direction:column}
.ritem{display:flex;gap:10px;align-items:flex-start}
.rline{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px}
.rdot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--accent);background:var(--bg);flex-shrink:0;margin-top:3px}
.rdot.start{background:var(--green);border-color:var(--green)}
.rdot.end{background:var(--accent);border-color:var(--accent)}
.rdot.gas{background:var(--accent2);border-color:var(--accent2)}
.rdot.special{background:var(--blue);border-color:var(--blue)}
.rvert{width:2px;background:var(--border);flex:1;min-height:14px;margin:2px 0}
.rinfo{padding-bottom:12px;flex:1}
.rpunto{font-size:13px;font-weight:600}.rnota{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.enots{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.enot{font-size:12px;background:var(--surface2);border-radius:6px;padding:8px 10px;color:var(--text);line-height:1.5;border-left:3px solid var(--border)}
.enot.cena{border-left-color:var(--accent2);background:#fdf6e3}
.gcard,.dcard,.rcard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;border:1px solid var(--border)}
.day-sep{background:#3a3a2e;color:#f4f1ec;font-family:Georgia,serif;font-size:.85rem;font-weight:bold;letter-spacing:.04em;padding:7px 14px;border-radius:6px;margin:18px 0 8px;opacity:.88}
.ghdr,.dhdr,.rhdr{padding:12px 14px;display:flex;align-items:center;gap:10px}
.gcico,.dcico,.rcico{font-size:22px;flex-shrink:0}
.gtit,.dtit,.rtit{font-size:13px;font-weight:700}.gsub,.dsub,.rsub{font-size:11px;color:var(--muted);margin-top:2px}
.gbody,.dbody,.rbody{padding:0 14px 12px;border-top:1px solid var(--surface2)}
.gdet,.ddet,.rdet{font-size:12px;color:var(--muted);padding:6px 0 2px;line-height:1.6}
.gdet span,.ddet span{color:var(--text);font-weight:600}
.chip{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.chip.cr{background:#fcecea;color:var(--accent)}.chip.ok{background:#edf7ef;color:var(--green)}
.chip.inf{background:#e8f1f8;color:var(--blue)}.chip.nar{background:#fdf6e3;color:var(--accent2)}
.alink{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:6px 0;text-decoration:none;font-weight:600}
.alink:hover{text-decoration:underline}
.alink.map{color:var(--blue)}.alink.tel{color:var(--green)}.alink.web{color:var(--accent2)}
.cksec{margin-bottom:20px}
.ckhdr{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.ckitem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface2);font-size:13px}
.ckitem input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.ckitem label{cursor:pointer;line-height:1.4}
.ckitem input:checked + label{text-decoration:line-through;color:var(--muted)}
.prog{background:var(--surface2);border-radius:20px;height:6px;margin-bottom:16px;overflow:hidden}
.progb{height:100%;background:linear-gradient(90deg,var(--green),var(--accent2));border-radius:20px;transition:.3s;width:0%}
</style>
</head>

let curP=null;

function renderSel(){
  document.getElementById('pgrid').innerHTML=PI.map(p=>`
    <button class="pbtn" onclick="selectP('${p.id}')">
      <span class="pico">${p.ico}</span>
      <span class="pnm">${p.nm}${p.badge==='A2'?' <span style="font-size:9px;background:rgba(200,217,138,0.25);color:#c8d98a;padding:1px 5px;border-radius:10px;vertical-align:middle">A2</span>':''}</span>
      <span class="pmot">${p.mot}</span>
    </button>`).join('');
}

function selectP(id){
  curP=PI.find(p=>p.id===id);
  document.getElementById('hnam').textContent=curP.nm;
  document.getElementById('hmot').textContent=curP.mot+' · '+curP.dep+'L · ~'+curP.aut+' km/dep';
  document.getElementById('hbdg').textContent=curP.ico;
  renderAlertas();renderEtapas();renderGas();renderAlo();renderRest();renderCK();
  document.getElementById('sel').style.display='none';
  document.getElementById('app').style.display='flex';
  window.scrollTo(0,0);
  showTab('ruta',document.querySelector('.ntab'));
}

function goBack(){
  document.getElementById('sel').style.display='flex';
  document.getElementById('app').style.display='none';
}

function showTab(id,btn){
  document.querySelectorAll('.tcont').forEach(t=>t.classList.remove('show'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('show');
  if(btn)btn.classList.add('active');
}

function addToCalendar(title, date, desc, fname) {
  var ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\n'
    + 'DTSTART:' + date + 'T090000\r\n'
    + 'DTEND:' + date + 'T093000\r\n'
    + 'SUMMARY:' + title + '\r\n'
    + 'DESCRIPTION:' + desc + '\r\n'
    + 'BEGIN:VALARM\r\nTRIGGER:-P3D\r\nACTION:DISPLAY\r\nDESCRIPTION:Recordatorio\r\nEND:VALARM\r\n'
    + 'END:VEVENT\r\nEND:VCALENDAR';
  var blob = new Blob([ics], {type:'text/calendar'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = (fname||'transpirenaica') + '.ics'; a.click();
  URL.revokeObjectURL(url);
}

function togglePago(idx){
  if(curP.esPedro) curP.cobros[idx].pagado = !curP.cobros[idx].pagado;
  else curP.pagos[idx].pagado = !curP.pagos[idx].pagado;
  renderAlertas();
}

function btnCal(label, date, desc, fname, bg, col, border) {
  var bc = border ? 'border:1px solid ' + col + ';' : 'border:none;';
  return '<button onclick="addToCalendar(\'' + label + '\',\'' + date + '\',\'' + desc + '\',\'' + fname + '\')" '
    + 'style="background:' + bg + ';color:' + col + ';' + bc + 'border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:Georgia,serif">'
    + label + '</button>';
}

function renderPanelPagos(){
  var html = '';
  if(curP.esPedro){
    var totalAdelantado = 1409.62;
    var cobrado = 0;
    curP.cobros.forEach(function(c){ if(c.pagado) cobrado += parseFloat(c.total); });
    var pendiente = (totalAdelantado - 277.66 - cobrado).toFixed(2);
    var filas = '';
    curP.cobros.forEach(function(c,i){
      var col = c.pagado ? 'var(--green)' : 'var(--accent)';
      var ico = c.pagado ? '✅' : '⏳';
      filas += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--surface2);font-size:13px">'
        + '<input type="checkbox"' + (c.pagado?' checked':'') + ' onchange="togglePago(' + i + ')" style="width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0">'
        + '<div style="flex:1"><div style="font-weight:700">' + c.piloto + '</div>'
        + '<div style="font-size:11px;color:var(--muted)">Beri: ' + c.beri + ' &middot; Brases: ' + c.brases + ' &middot; Silken: ' + c.silken + '</div></div>'
        + '<div style="font-weight:700;color:' + col + '">' + ico + ' €' + parseFloat(c.total).toFixed(2).replace('.',',') + '</div></div>';
    });
    var pendCol = parseFloat(pendiente) > 0 ? 'var(--accent)' : 'var(--green)';
    var pendTxt = parseFloat(pendiente) > 0 ? '⏳ €' + pendiente.replace('.',',') : '✅ ¡Todo cobrado!';
    html = '<div style="background:var(--surface);border-radius:var(--radius);border:2px solid var(--accent2);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden">'
      + '<div style="background:var(--accent2);color:#fff;padding:12px 16px">'
      + '<div style="font-size:13px;font-weight:700;letter-spacing:.5px">💰 TESORERÍA — LO QUE TE DEBEN</div>'
      + '<div style="font-size:11px;opacity:.85;margin-top:2px">Límite cobro: 31/03/2026</div></div>'
      + '<div style="padding:0 16px">' + filas + '</div>'
      + '<div style="padding:12px 16px;background:var(--surface2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">'
      + '<div><div style="font-size:11px;color:var(--muted)">Total adelantado</div><div style="font-size:16px;font-weight:700">€1.409,62</div></div>'
      + '<div><div style="font-size:11px;color:var(--muted)">Tu parte</div><div style="font-size:16px;font-weight:700">€277,66</div></div>'
      + '<div><div style="font-size:11px;color:var(--muted)">Pendiente de cobrar</div>'
      + '<div style="font-size:16px;font-weight:700;color:' + pendCol + '">' + pendTxt + '</div></div></div>'
      + '<div style="padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap">'
      + btnCal('📅 Pagar Beri — 09/06 (Revolut)', '20260609', 'Pagar Hotel Beri el 09/06/2026 con tarjeta Revolut', 'pago_beri', '#fcecea', 'var(--accent)', true)
      + btnCal('📅 Cancelación Beri (11/06)', '20260611', 'Cancelacion gratuita Hotel Beri hasta 11/06/2026 12:00h', 'cancelacion_beri', '#fcecea', 'var(--accent)', true)
      + '<div style="background:#e8f5e9;border:1px solid var(--green);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);font-weight:700;width:100%">✅ Les Brases — PAGADO el 08/03/2026 con tarjeta Santander (€340)</div>'
      + btnCal('📅 Cancelación Les Brases (17/06)', '20260617', 'Cancelacion gratuita Hotel Les Brases hasta 17/06/2026 12:00h', 'cancelacion_brases', '#fcecea', 'var(--accent)', true)
      + btnCal('📅 Pagar Silken — 17/06 (Santander)', '20260617', 'Pagar Silken Puerta de Irati el 17/06/2026 con tarjeta Santander — €625 total', 'pago_silken', '#fcecea', 'var(--accent)', true)
      + btnCal('📅 Cancelación Silken (18/06)', '20260618', 'Cancelacion gratuita Silken Puerta de Irati hasta 18/06/2026', 'cancelacion_silken', '#fcecea', 'var(--accent)', true)
      + '</div></div>';
  } else {
    var debe = 0;
    curP.pagos.forEach(function(p){ debe += parseFloat(p.importe); });
    var pagado = 0;
    curP.pagos.forEach(function(p){ if(p.pagado) pagado += parseFloat(p.importe); });
    var pendiente = (debe - pagado).toFixed(2);
    var filas = '';
    curP.pagos.forEach(function(p,i){
      var col = p.pagado ? 'var(--green)' : 'var(--accent)';
      var tach = p.pagado ? 'text-decoration:line-through;color:var(--muted);' : '';
      var ico = p.pagado ? '✅' : '⏳';
      filas += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--surface2);font-size:13px">'
        + '<input type="checkbox"' + (p.pagado?' checked':'') + ' onchange="togglePago(' + i + ')" style="width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0">'
        + '<div style="flex:1;' + tach + '">' + p.hotel + '</div>'
        + '<div style="font-weight:700;color:' + col + ';white-space:nowrap">' + ico + ' €' + parseFloat(p.importe).toFixed(2).replace('.',',') + '</div></div>';
    });
    var pendCol = parseFloat(pendiente) > 0 ? 'var(--accent)' : 'var(--green)';
    var pendTxt = parseFloat(pendiente) > 0 ? '⏳ Te faltan €' + pendiente.replace('.',',') : '✅ ¡Todo pagado!';
    html = '<div style="background:var(--surface);border-radius:var(--radius);border:2px solid var(--accent);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden">'
      + '<div style="background:var(--accent);color:#fff;padding:12px 16px">'
      + '<div style="font-size:13px;font-weight:700;letter-spacing:.5px">💳 PAGOS A PEDRO</div>'
      + '<div style="font-size:11px;opacity:.85;margin-top:2px">⚠️ Límite: 31/03/2026</div></div>'
      + '<div style="padding:0 16px">' + filas + '</div>'
      + '<div style="padding:10px 16px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'
      + '<div><div style="font-size:11px;color:var(--muted)">Pendiente</div>'
      + '<div style="font-size:16px;font-weight:700;color:' + pendCol + '">' + pendTxt + '</div></div>'
      + btnCal('📅 Recordatorio pago (31/03)', '20260331', 'Pagar a Pedro antes del 31/03/2026', 'pago_pedro', 'var(--accent2)', '#fff', false)
      + '</div>'
      + '</div></div>';
  }
  return html;
}

function renderAlertas(){
  document.getElementById('alertas').innerHTML = renderPanelPagos()
    + curP.alerts.map(function(a){ return '<div class="alert al-' + a.t + '"><h4>' + a.h + '</h4>' + a.b + '</div>'; }).join('');
}

function toggleEtapa(n){
  document.getElementById('eb-'+n).classList.toggle('open');
}

function renderEtapas(){
  document.getElementById('etapas').innerHTML=ET.map(e=>{
    const ruta=e.ruta.map((r,i)=>{
      const last=i===e.ruta.length-1;
      return `<div class="ritem">
        <div class="rline">
          <div class="rdot ${r.d||'mid'}"></div>
          ${!last?'<div class="rvert"></div>':''}
        </div>
        <div class="rinfo">
          <div class="rpunto">${r.p}</div>
          ${r.n?`<div class="rnota">${r.n}</div>`:''}
        </div>
      </div>`;
    }).join('');
    const nots=e.not.map(n=>{
      const c=n.includes('CENA')||n.includes('Cena')||n.includes('🍽')||n.includes('🎉')||n.includes('🔥');
      return `<div class="enot${c?' cena':''}">${n}</div>`;
    }).join('');
    return `<div class="ecard">
      <div class="ehdr" onclick="toggleEtapa('${e.n}')">
        <span class="eico">${e.e}</span>
        <div class="einf">
          <div class="etit">${e.tit}</div>
          <div class="esub">${e.f}</div>
        </div>
        <div class="ekm">${e.km} km · ${e.d}</div>
      </div>
      <div class="ebody" id="eb-${e.n}">
        <div class="edesc">${e.desc}</div>
        <div class="ruta">${ruta}</div>
        <div class="enots">${nots}</div>
      </div>
    </div>`;
  }).join('');
}

function renderGas(){
  let html='',lastDia='';
  GAS.forEach(g=>{
    if(g.dia!==lastDia){html+=`<div class="day-sep">⛽ ${g.dia}</div>`;lastDia=g.dia;}
    html+=`<div class="gcard"><div class="ghdr"><span class="gcico">⛽</span><div style="flex:1"><div class="gtit">${g.nm}</div><div class="gsub">${g.hr}</div></div><span class="chip ${g.key?'cr':'ok'}">${g.key?'CLAVE':'OK'}</span></div><div class="gbody"><div class="gdet"><span>📍</span> ${g.dir}</div><div class="gdet">${g.not}</div><a class="alink map" href="${g.map}" target="_blank">🗺 Ver en mapa</a>${g.tel?`<a class="alink tel" href="tel:${g.tel}" style="margin-left:12px">📞 ${g.tel}</a>`:''}</div></div>`;
  });
  document.getElementById('gasolineras').innerHTML=html;
}

function renderAlo(){
  const hab=curP.hab==='doble'?`Habitación doble compartida con ${curP.comp}`:'Habitación individual';
  let html=`<div class="alert al-info" style="margin-bottom:14px"><h4>Tu alojamiento</h4>${hab}</div>`;
  let lastNc='';
  ALO.forEach(a=>{
    if(a.nc!==lastNc){html+=`<div class="day-sep">🛏 ${a.nc} · ${a.f} · ${a.l}</div>`;lastNc=a.nc;}
    html+=`<div class="dcard"><div class="dhdr"><span class="dcico">🛏</span><div style="flex:1"><div class="dtit">${a.nm}</div><div class="dsub">${a.dir}</div></div><span class="chip inf">${a.pr}</span></div><div class="dbody"><div class="ddet">${a.not}</div><a class="alink map" href="${a.map}" target="_blank">🗺 Ver en mapa</a>${a.tel?`<a class="alink tel" href="tel:${a.tel}" style="margin-left:12px">📞 ${a.tel}</a>`:''}${a.web?`<a class="alink web" href="${a.web}" target="_blank" style="margin-left:12px">🌐 Web</a>`:''}</div></div>`;
  });
  document.getElementById('alojamientos').innerHTML=html;
}

function renderRest(){
  let html='',lastD='';
  REST.forEach(r=>{
    const isCena=r.m.includes('Cena')||r.m.includes('🎉');
    if(r.d!==lastD){html+=`<div class="day-sep">🍽 ${r.d}</div>`;lastD=r.d;}
    html+=`<div class="rcard"><div class="rhdr"><span class="rcico">${isCena?'🍷':'🍽'}</span><div style="flex:1"><div class="rtit">${r.nm}</div><div class="rsub">${r.m} · ${r.loc}</div></div><span class="chip ${isCena?'nar':'ok'}">${r.pr}</span></div><div class="dbody"><div class="ddet"><span>📍</span> ${r.dir}</div><div class="ddet">${r.not}</div><a class="alink map" href="${r.map}" target="_blank">🗺 Ver en mapa</a>${r.tel?`<a class="alink tel" href="tel:${r.tel}" style="margin-left:12px">📞 ${r.tel}</a>`:''}</div></div>`;
  });
  document.getElementById('restaurantes').innerHTML=html;
}

function renderCK(){
  let html='',sec='',items=[];
  CK.forEach((x,i)=>{
    if(x.cat){
      if(items.length)html+=`<div class="cksec"><div class="ckhdr">${sec}</div>${items.join('')}</div>`;
      sec=x.cat;items=[];
    } else {
      items.push(`<div class="ckitem"><input type="checkbox" id="ck${i}" onchange="updProg()"><label for="ck${i}">${x.item}</label></div>`);
    }
  });
  if(items.length)html+=`<div class="cksec"><div class="ckhdr">${sec}</div>${items.join('')}</div>`;
  document.getElementById('checklist').innerHTML=html;
  updProg();
}

function updProg(){
  const all=document.querySelectorAll('#checklist input');
  const done=[...all].filter(x=>x.checked).length;
  document.getElementById('progb').style.width=(done/all.length*100)+'%';
}

renderSel();
</script>
